<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>命運的靜物詩 · Remnants of Destiny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ===== CSS Variables ===== */
    :root {
      --accent: #66a9c9;
      --accent-dark: #4a8aab;
      --accent-light: #a8d0e6;
      --accent-glow: rgba(102, 169, 201, 0.35);

      --bg: #f5f0eb;
      --bg-card: #ffffff;
      --bg-sidebar: #ffffffee;
      --bg-nav: rgba(245, 240, 235, 0.88);
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a6a;
      --text-muted: #8888aa;
      --border: rgba(102, 169, 201, 0.2);
      --shadow: rgba(102, 169, 201, 0.15);
      --overlay: rgba(26, 26, 46, 0.55);

      --sidebar-w: 280px;
      --nav-h: 64px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-sidebar: #161b22ee;
      --bg-nav: rgba(13, 17, 23, 0.92);
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --border: rgba(102, 169, 201, 0.15);
      --shadow: rgba(0, 0, 0, 0.4);
      --overlay: rgba(0, 0, 0, 0.65);
    }

   .back-top {
   position: fixed;
  bottom: 28px;
  right: 28px;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--accent);
  cursor: pointer;
  font-size: 16px;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 8px 30px var(--shadow);
  transition: all 0.3s ease;
  z-index: 999;
    opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
}

.back-top.show {
  opacity: 1;
  pointer-events: all;
}

.back-top:hover {
  background: var(--accent);
  color: #fff;
  transform: translateY(-3px);
}

.section-title {
  text-align: center;
  width: 100%;
}

/* 畫面中央 */
.story-text {
  font-size: 19px;
  line-height: 1.7;
  color: var(--text-primary);
  font-family: 'Noto Serif SC', serif;
  /* 增加置中設定 */
  margin: 0 auto !important; 
  float: none !important;
}

/* 保持首字放大 */
.story-text p:first-of-type::first-letter {
  font-family: 'Cinzel Decorative', serif;
  font-size: 56px;
  float: left;
  line-height: 0.85;
  margin: 6px 12px 0 0;
  color: var(--accent);
}

/* 特別上色句子 */
.highlight-line {
  color: #66a9c9; /* 可以換你喜歡的顏色 */
  font-weight: 500;
}

/* 引用區塊 */
.quote-block {
  margin-top: 20px;
  padding: 12px 18px;
  border-left: 3px solid #aaa;
  color: #999;
  font-style: italic;
  background-color: rgba(255, 255, 255, 0.03); /* 很淡的底色 */
  line-height: 1.6;
}

    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Serif SC', 'Lora', serif;
      background: var(--bg);
      color: var(--text-primary);
      transition: background var(--transition), color var(--transition);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    /* ===== Overlay Backdrop ===== */
    .sidebar-backdrop {
      position: fixed; inset: 0; z-index: 99;
      background: var(--overlay);
      opacity: 0; pointer-events: none;
      transition: opacity var(--transition);
      backdrop-filter: blur(3px);
    }
    .sidebar-backdrop.active { opacity: 1; pointer-events: all; }

    /* ===== Sidebar ===== */
    .sidebar {
      position: fixed; top: 0; left: 0; z-index: 100;
      width: var(--sidebar-w); height: 100vh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(20px);
      transform: translateX(calc(-1 * var(--sidebar-w)));
      transition: transform var(--transition);
      display: flex; flex-direction: column;
      box-shadow: 4px 0 30px var(--shadow);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 13px; letter-spacing: 0.12em;
      color: var(--accent); text-transform: uppercase;
    }
    .sidebar-subtitle {
      font-size: 11px; color: var(--text-muted);
      margin-top: 4px; letter-spacing: 0.08em;
    }
    .sidebar-close {
      position: absolute; top: 20px; right: 16px;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 22px;
      padding: 4px; border-radius: 6px;
      transition: color var(--transition), background var(--transition);
    }
    .sidebar-close:hover { color: var(--accent); background: var(--border); }

    .sidebar-nav { flex: 1; padding: 20px 0; overflow-y: auto; }
    .nav-section-title {
      font-size: 10.5px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted); padding: 0 24px 8px;
      font-family: 'Cinzel Decorative', serif;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px; cursor: pointer;
      color: var(--text-secondary); font-size: 14px;
      transition: all var(--transition); text-decoration: none;
      position: relative;
    }
    .nav-item::before {
      content: ''; position: absolute; left: 0; top: 50%;
      transform: translateY(-50%) scaleY(0);
      width: 3px; height: 70%; border-radius: 0 2px 2px 0;
      background: var(--accent); transition: transform var(--transition);
    }
    .nav-item:hover, .nav-item.active {
      color: var(--accent); background: var(--accent-glow);
    }
    .nav-item:hover::before, .nav-item.active::before { transform: translateY(-50%) scaleY(1); }
    .nav-icon { font-size: 17px; width: 20px; text-align: center; }

    .sidebar-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-muted);
      text-align: center; letter-spacing: 0.06em;
    }

    /* ===== Topbar ===== */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: var(--nav-h);
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px;
      background: var(--bg-nav);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .topbar-menu-btn {
      background: none; border: none; cursor: pointer;
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; gap: 5px;
      transition: background var(--transition);
      flex-shrink: 0;
    }
    .topbar-menu-btn:hover { background: var(--accent-glow); }
    .topbar-menu-btn span {
      display: block; width: 20px; height: 2px;
      background: var(--accent); border-radius: 1px;
      transition: transform var(--transition), opacity var(--transition);
    }
    .topbar-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 14px; letter-spacing: 0.1em;
      color: var(--accent); white-space: nowrap;
    }

    /* ===== Main Content ===== */
    .main { padding-top: var(--nav-h); }

    /* ===== Hero Carousel ===== */
    .hero {
      position: relative;
  height: 85vh; 
  max-height: 900px;
  min-height: 500px;
  overflow: hidden;
    }
    .carousel-slides { position: relative; width: 100%; height: 100%; }
    .carousel-slide {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 1.2s ease;
      display: flex; align-items: flex-end;
    }
    .carousel-slide.active { opacity: 1; }
    .slide-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transform: scale(1.05);
      transition: transform 8s ease;
    }
    .carousel-slide.active .slide-bg { transform: scale(1); }
    .slide-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.82) 0%,
        rgba(0,0,0,0.35) 50%,
        rgba(0,0,0,0.1) 100%
      );
    }
    .slide-content {
      position: relative; z-index: 2;
      padding: 60px 80px; max-width: 750px;
    }
    .slide-tag {
      display: inline-block;
      font-family: 'Cinzel Decorative', serif;
      font-size: 10px; letter-spacing: 0.2em;
      color: var(--accent-light); text-transform: uppercase;
      margin-bottom: 16px; padding: 4px 14px;
      border: 1px solid var(--accent-light);
      border-radius: 20px;
    }
    .slide-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(28px, 5vw, 58px);
      color: #ffffff; line-height: 1.2;
      margin-bottom: 16px; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    .slide-desc {
      font-family: 'Lora', serif; font-style: italic;
      font-size: 15px; color: rgba(255,255,255,0.75);
      line-height: 1.7; max-width: 480px;
    }

    /* Carousel Controls */
    .carousel-controls {
      position: absolute; bottom: 40px; right: 80px;
      z-index: 10; display: flex; align-items: center; gap: 12px;
    }
    .carousel-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      transition: all 0.25s;
    }
    .carousel-btn:hover { background: var(--accent); border-color: var(--accent); }
    .carousel-dots {
      display: flex; gap: 8px; align-items: center;
    }
    .carousel-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.4); cursor: pointer;
      transition: all 0.3s; border: none;
    }
    .carousel-dot.active {
      width: 24px; border-radius: 4px;
      background: var(--accent);
    }

    /* Scroll hint */
    .scroll-hint {
      position: absolute; bottom: 28px; left: 50%;
      transform: translateX(-50%); z-index: 10;
      color: rgba(255,255,255,0.5); font-size: 11px;
      letter-spacing: 0.15em; text-transform: uppercase;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .scroll-arrow {
      width: 1px; height: 36px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.5));
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse { 0%,100%{opacity:0.3; transform:scaleY(0.7)} 50%{opacity:1; transform:scaleY(1)} }

    /* ===== Story Section ===== */
    .story-section {
      padding: 100px 0 40px; position: relative; overflow: hidden;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }
    .section-eyebrow {
      font-family: 'Cinzel Decorative', serif;
      font-size: 10px; letter-spacing: 0.2em;
      color: var(--accent); text-transform: uppercase;
      margin-bottom: 12px;
    }
    .section-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(22px, 3.5vw, 42px);
      color: var(--text-primary); margin-bottom: 40px;
      line-height: 1.25;
    }
    .story-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 60px; align-items: start;
    }
    .story-text p {
      font-family: 'Lora', serif; font-size: 15px;
      color: var(--text-secondary); line-height: 2;
      margin-bottom: 20px;
    }
    .story-text p:first-of-type::first-letter {
      font-family: 'Cinzel Decorative', serif;
      font-size: 56px; float: left; line-height: 0.85;
      margin: 6px 12px 0 0; color: var(--accent);
    }
    .story-aside {
      position: sticky; top: calc(var(--nav-h) + 24px);
    }
    .char-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 8px 40px var(--shadow);
    }
    .char-card-img {
      width: 100%; aspect-ratio: 3/4;
      background: linear-gradient(135deg, #2a4a6b, #66a9c9, #4a8aab);
      display: flex; align-items: center; justify-content: center;
      font-size: 80px; position: relative; overflow: hidden;
    }
    .char-card-img::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 60%, var(--bg-card));
    }
    .char-card-body { padding: 24px; }
    .char-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 18px; color: var(--text-primary); margin-bottom: 4px;
    }
    .char-title {
      font-size: 12px; color: var(--accent);
      letter-spacing: 0.08em; margin-bottom: 16px;
    }
    .char-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .char-stat label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em; display: block;
      margin-bottom: 3px;
    }
    .char-stat span { font-size: 13px; color: var(--text-secondary); }
    .char-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
    .char-tag {
      padding: 4px 12px; border-radius: 20px;
      font-size: 11px; border: 1px solid var(--border);
      color: var(--accent); background: var(--accent-glow);
    }

    /* ===== Divider ===== */
    .divider {
      display: flex; align-items: center; gap: 20px;
      margin: 80px 0 30px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-icon {
      font-family: 'Cinzel Decorative', serif;
      font-size: 10px; color: var(--accent);
      letter-spacing: 0.15em; white-space: nowrap;
    }

    /* ===== Articles ===== */
    .articles-section { padding: 0px 0 80px; }
    .articles-header {
      display: flex; align-items: flex-end;
      justify-content: space-between; margin-bottom: 48px;
    }
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }
    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .article-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px var(--shadow);
      border-color: var(--accent);
    }
    .article-thumb {
      width: 100%; aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; position: relative; overflow: hidden;
       }
    .article-thumb-inner {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
      transition: transform 0.5s ease;
    }
    .article-card:hover .article-thumb-inner { transform: scale(1.08); }
    .article-body { padding: 22px 24px 24px; }
    .article-meta {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .article-cat {
      font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent);
      font-family: 'Cinzel Decorative', serif;
    }
    .article-date { font-size: 11px; color: var(--text-muted); }
    .article-title {
      font-family: 'Lora', serif; font-size: 16px;
      color: var(--text-primary); line-height: 1.5;
      margin-bottom: 10px;
    }
    .article-excerpt {
      font-size: 13px; color: var(--text-muted); line-height: 1.7;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .article-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 18px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .article-read-more {
      font-size: 12px; color: var(--accent);
      letter-spacing: 0.08em; display: flex; align-items: center; gap: 4px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .article-read-more:hover { opacity: 0.7; }
    .article-tags { display: flex; gap: 6px; }
    .article-tag {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      background: var(--accent-glow); color: var(--accent); border: 1px solid var(--border);
    }

    /* No results */
    .no-results {
      grid-column: 1/-1; text-align: center; padding: 80px 0;
      color: var(--text-muted);
    }
    .no-results-icon { font-size: 48px; margin-bottom: 16px; }
    .no-results-text { font-size: 14px; }

    /* ===== Footer ===== */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 40px; text-align: center;
    }
    footer .footer-logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 16px; color: var(--accent);
      margin-bottom: 12px;
    }
    footer p {
      font-size: 12px; color: var(--text-muted);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    footer .footer-copyright {
      font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.05em; opacity: 0.65;
      margin-top: 10px;
    }

    /* ===== Fade-in animations ===== */
    .fade-in {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ===== Page Transitions ===== */
    .page-view {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 200;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(30px);
      pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.4,0,0.2,1), transform 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .page-view.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    /* ===== Sub-page Hero ===== */
    .subpage-hero {
      position: relative;
      width: 100%;
      height: 70vh;
      min-height: 420px;
      max-height: 800px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }
    .subpage-hero-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center top;
      transform: scale(1.04);
      transition: transform 8s ease;
    }
    .subpage-hero.loaded .subpage-hero-bg { transform: scale(1); }
    .subpage-hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.88) 0%,
        rgba(0,0,0,0.4) 55%,
        rgba(0,0,0,0.08) 100%
      );
    }
    .subpage-hero-content {
      position: relative; z-index: 2;
      padding: 56px 80px;
      max-width: 900px;
    }
    .subpage-eyebrow {
      font-family: 'Cinzel Decorative', serif;
      font-size: 10px; letter-spacing: 0.22em;
      color: var(--accent-light); text-transform: uppercase;
      margin-bottom: 14px; display: inline-block;
      padding: 4px 14px;
      border: 1px solid var(--accent-light);
      border-radius: 20px;
    }
    .subpage-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(30px, 5vw, 62px);
      color: #fff; line-height: 1.2;
      margin-bottom: 14px;
      text-shadow: 0 2px 24px rgba(0,0,0,0.6);
    }
    .subpage-subtitle {
      font-family: 'Lora', serif; font-style: italic;
      font-size: 16px; color: rgba(255,255,255,0.72);
      line-height: 1.7;
    }

    /* ===== Sub-page Top-left Button (menu or back) ===== */
    .subpage-top-btn {
      position: fixed;
      top: 18px; left: 20px;
      z-index: 300;
      display: flex; align-items: center; gap: 8px;
      background: rgba(13,17,23,0.28);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(102,169,201,0.22);
      color: rgba(255,255,255,0.82);
      font-family: 'Cinzel Decorative', serif;
      font-size: 11px; letter-spacing: 0.1em;
      padding: 9px 18px; border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }
    .subpage-top-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
    }
    .subpage-top-btn.back-btn:hover { transform: translateX(-3px); }
    .subpage-top-btn svg {
      width: 14px; height: 14px; flex-shrink: 0;
    }
    .subpage-menu-bars {
      display: flex; flex-direction: column; gap: 4px;
    }
    .subpage-menu-bars span {
      display: block; width: 16px; height: 2px;
      background: currentColor; border-radius: 1px;
    }

    /* ===== Section Extra Buttons ===== */
    .section-extra-btns {
      display: flex; justify-content: center; gap: 16px;
      padding: 32px 40px 0;
      flex-wrap: wrap;
    }
    .section-extra-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px;
      border-radius: 30px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);

    .toc-chapter-num { font-family: 'Cinzel Decorative', serif; font-size: 11px; color: var(--accent); min-width: 50px; }
    .toc-chapter-title { flex: 1; font-size: 14px; color: var(--text-primary); }
    .toc-chapter-arrow { color: var(--accent); font-size: 16px; }

    /* ===== Character Card Clickable ===== */
    .char-profile-card {
      cursor: pointer;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }
    .char-profile-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 60px var(--shadow);
      border-color: var(--accent);
    }
    .char-profile-card .char-read-more {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 14px; font-size: 12px; color: var(--accent);
      font-family: 'Cinzel Decorative', serif; letter-spacing: 0.08em;
      opacity: 0; transform: translateX(-6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .char-profile-card:hover .char-read-more {
      opacity: 1; transform: translateX(0);
    }

    /* ===== Character Detail Page ===== */
    .char-detail-page { min-height: 100vh; background: var(--bg); }
    .char-detail-hero {
      position: relative; width: 100%; height: 65vh;
      min-height: 380px; max-height: 780px;
      overflow: hidden; display: flex; align-items: flex-end;
    }
    .char-detail-hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center top;
    }
    .char-detail-hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
    }
    .char-detail-hero-content {
      position: relative; z-index: 2; padding: 52px 80px;
      display: flex; align-items: flex-end; gap: 48px; width: 100%;
    }
    .char-detail-avatar {
      width: 130px; height: 130px; border-radius: 50%;
      border: 3px solid var(--accent);
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 56px;
    }
    .char-detail-meta { flex: 1; }
    .char-detail-back {
      position: fixed; top: 18px; left: 20px; z-index: 300;
      display: flex; align-items: center; gap: 8px;
      background: rgba(13,17,23,0.28); backdrop-filter: blur(14px);
      border: 1px solid rgba(102,169,201,0.22); color: rgba(255,255,255,0.82);
      font-family: 'Cinzel Decorative', serif; font-size: 11px; letter-spacing: 0.1em;
      padding: 9px 18px; border-radius: 30px; cursor: pointer; transition: all 0.3s ease;
    }
    .char-detail-back:hover { background: var(--accent); border-color: var(--accent); transform: translateX(-3px); }
    .char-detail-back svg { width: 14px; height: 14px; }
    .char-detail-body { max-width: 900px; margin: 0 auto; padding: 60px 40px 100px; }
    .char-detail-section { margin-bottom: 52px; }
    .char-detail-section-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 18px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .char-detail-section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .char-detail-text {
      font-family: 'Noto Serif SC', serif; font-size: 15px;
      line-height: 2.1; color: var(--text-secondary);
    }
    .char-detail-text p { margin-bottom: 18px; }
    .char-stat-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px; margin-top: 4px;
    }
    .char-stat-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
    }
    .char-stat-item label {
      font-size: 12.75px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-muted); display: block; margin-bottom: 6px;
      font-family: 'Cinzel Decorative', serif;
    }
    .char-stat-item span {
      font-size: 14.5px; color: var(--text-primary);
      font-family: 'Noto Serif SC', serif;
    }
    .char-quote-block {
      margin: 28px 0; padding: 20px 28px;
      border-left: 3px solid var(--accent);
      background: var(--bg-card); border-radius: 0 14px 14px 0;
      font-style: italic; color: var(--text-muted); line-height: 1.9;
      font-family: 'Lora', serif; font-size: 15px;
    }
    .char-relation-list { display: flex; flex-direction: column; gap: 12px; }
    .char-relation-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .char-relation-icon { font-size: 28px; flex-shrink: 0; }
    .char-relation-name { font-size: 14px; color: var(--text-primary); margin-bottom: 3px; font-family: 'Noto Serif SC', serif; }
    .char-relation-role { font-size: 12px; color: var(--accent); }
    .char-trait-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .char-trait {
      padding: 7px 16px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg-card);
      font-size: 13px; color: var(--text-secondary);
      font-family: 'Noto Serif SC', serif;
    }

    @media (max-width: 768px) {
      .char-detail-hero-content { flex-direction: column; align-items: flex-start; gap: 16px; padding: 36px 24px; }
      .char-detail-body { padding: 40px 20px 80px; }
      .char-stat-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- ===================== HOME PAGE ===================== -->
  <template v-if="currentPage === 'home'">
    <!-- Sidebar Backdrop -->
    <div class="sidebar-backdrop" :class="{ active: sidebarOpen }" @click="sidebarOpen = false"></div>

    <aside class="sidebar" :class="{ open: sidebarOpen }">

   <a class="nav-item" @click="worldsModalOpen = true; subSidebarOpen = false"> <span class="nav-icon">🌍</span> 前往其他小世界</a>

</aside>

    <!-- Topbar -->
    <header class="topbar">

        <span></span><span></span><span></span>
      </button>

    <!-- Main -->
    <main class="main">
      <!-- Hero Carousel -->
      <section class="hero" id="hero">
        <div class="carousel-slides">
          <div
            v-for="(slide, i) in slides"
            :key="i"
            class="carousel-slide"
            :class="{ active: currentSlide === i }"

            <div class="slide-bg" :style="{ background: slide.bg }"></div>
            <div class="slide-gradient"></div>
            <div class="slide-content">
              <span class="slide-tag">{{ slide.tag }}</span>
              <h1 class="slide-title">{{ slide.title }}</h1>
              <p class="slide-desc">{{ slide.desc }}</p>
            </div>
          </div>
        </div>

        <div class="carousel-controls">
          <button class="carousel-btn" @click="prevSlide">‹</button>
          <div class="carousel-dots">
            <button
              v-for="(_, i) in slides"
              :key="i"
              class="carousel-dot"
              :class="{ active: currentSlide === i }"
              @click="goToSlide(i)"
            ></button>
          </div>
          <button class="carousel-btn" @click="nextSlide">›</button>
        </div>

        <div class="scroll-hint">
          <span>Scroll</span>
          <div class="scroll-arrow"></div>
        </div>
      </section>

      <!-- Story Section -->
     <section class="story-section" id="story">
  <div class="container" style="text-align: center;"> <div class="fade-in">
      <div class="section-eyebrow">Introduction</div>
      <h2 class="section-title">引言</h2>
    </div>
    
    <div class="story-grid" style="display: block;"> <div class="story-text fade-in" style="max-width: 700px; margin: 0 auto; text-align: left;">
          <p>
            在那片被霧霾壟罩的邊境之地，有一棟古老的宅邸。據當地村民所說，從未有人看過宅邸主人的模樣，唯有渡鴉的啼叫聲在附近久久迴盪，彷彿在守護著什麼秘密。
          </p>
          <p>
            ▍歡迎來到命運的靜物詩 —— 
             <span style="font-family: 'Arial', sans-serif;">Remnants of Destiny</span><br>
            這是一個以渡鴉小姐為主角所展開的故事。
          </p>
          <p>
            這是一個關於…<br>
            ✦ 三位科學家所製造的巴別塔<br>
            ✦ 兩隻神鳥所帶來的因果<br>
            ✦ 這是由一位少女所親手書寫的 — 
            <span style="font-weight: bold; font-size: 20px;">世界的終章</span>
          </p>
        </div>
        </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="section-eyebrow">✦ I would like to introduce...  ✦</div>
        <div class="divider-line"></div>
      </div>
    </div>
  </section>

      <!-- Articles Section -->
     <section class="articles-section" id="articles">
  <div class="container">
    
    <div class="articles-grid">
      <div
        v-if="filteredArticles.length === 0"
        class="no-results"
      >
        <div class="no-results-icon">🔎</div>
        <div class="no-results-text">未找到相關文章</div>
      </div>

      <div
        v-for="(article, i) in filteredArticles"
        :key="article.id"
        class="article-card fade-in"
        :style="{ transitionDelay: `${i * 0.07}s` }"
      >
        <div class="article-body">
          <div class="article-meta">
            <span class="article-cat">{{ article.category }}</span>
            <span style="color: var(--border);">·</span>
            <span class="article-date">{{ article.date }}</span>
          </div>
          <h3 class="article-title">{{ article.title }}</h3>
          <p class="article-excerpt">{{ article.excerpt }}</p>
          <div class="article-footer">
            <span class="article-read-more" @click="openPage(article.id)">閱讀全文 →</span>
            <div class="article-tags">
              <span class="article-tag" v-for="tag in article.tags" :key="tag">{{ tag }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Extra buttons below the three sections -->
  <div class="section-extra-btns">
    <button class="section-extra-btn primary" @click="openStoryHub">
      ✦ 探索她的故事
    </button>

      🌍 前往其他小世界
    </button>
  </div>
</section>

    <footer>

    </footer>

    <button 
      class="back-top" 
      :class="{ show: showBackTop }" 
      @click="scrollToTop"
      title="回到頂部"
    >
      ↑
    </button>
  </template>

  <!-- ===================== SUB PAGES ===================== -->
  <template v-else-if="currentPage === 'origin' || currentPage === 'character' || currentPage === 'char-detail' || currentPage === 'worldview' || currentPage === 'story-hub'">
    <!-- Sub-page Sidebar Backdrop -->
    <div class="sidebar-backdrop" :class="{ active: subSidebarOpen }" @click="subSidebarOpen = false"></div>

    <!-- Sub-page Sidebar -->
    <aside class="sidebar" :class="{ open: subSidebarOpen }">
      <div class="sidebar-header">
        <div class="sidebar-logo">Remnants of Destiny</div>

      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-title">基本介面</div>
        <a class="nav-item" @click="goHome(); subSidebarOpen = false">
          <span class="nav-icon">✦</span> 返回首頁
        </a>
        <div style="margin-top: 20px">
          <div class="nav-section-title">背景故事</div>
          <a class="nav-item" :class="{ active: currentPage === 'origin' }" @click="openPage(1); subSidebarOpen = false">
            <span class="nav-icon">🌌</span> 一切的起源
          </a>
          <a class="nav-item" :class="{ active: currentPage === 'character' }" @click="openPage(2); subSidebarOpen = false">
            <span class="nav-icon">👤</span> 角色介紹
          </a>
          <a class="nav-item" :class="{ active: currentPage === 'worldview' }" @click="openPage(3); subSidebarOpen = false">
            <span class="nav-icon">🌐</span> 世界觀設定
          </a>

           <div style="margin-top: 20px"></div>
    <div class="nav-section-title">主要故事</div>

      <span class="nav-icon">✨</span> 探索她的故事

  </a>

      </div>
    </aside>

    <!-- Sub-page Top-left Menu Button (hidden when sidebar open) -->
    <button class="subpage-top-btn" @click="subSidebarOpen = true" v-show="!subSidebarOpen">
      <div class="subpage-menu-bars"><span></span><span></span><span></span></div>
      目錄
    </button>

    <!-- ===== ORIGIN PAGE ===== -->
<div v-if="currentPage === 'origin'">
  <div class="subpage-hero loaded">
    <div class="subpage-hero-bg" style="background: linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)), url(https://cdn.phototourl.com/free/2026-04-09-0f05ec34-f3c5-4942-8b26-da63dbbf484a.jpg) center/cover no-repeat;"></div>
    <div class="subpage-hero-gradient"></div>
    <div class="subpage-hero-content">
      <span class="subpage-eyebrow">Origin · 起源</span>
      <h1 class="subpage-title">一 切 的 起 源</h1>
      <p class="subpage-subtitle">過去存在於未來中，而未來亦在過去裡</p>
    </div>
  </div>

  <div class="subpage-body">
    <section class="subpage-section">
      <div class="subpage-section-title">創世  ·  Genesis</div>
      <div class="subpage-text">
        <p>
          在很遠很遠的未來中，存在著一個沒有「生育」概念的國度。在這裡，人類無法憑藉自己創造生命，只能依靠神明的垂怜。<br><br>
          然而，不知怎麼的，有一群科學家卻在地底下發現了足以與神明比肩的事物：
          <span class="highlight-line">一條自千百年前便已存在的寶石礦脈。</span><br><br>
          寶石礦脈裡蘊含著早該消失的魔法。而這對人類來說，是「創世」最好的「原料」。<br>
        </p>
        <blockquote class="quote-block">
          人們仰望神明的慈悲太久，也早就厭倦了祈求。<br>
          於是，一場長達百年的「創世」實驗悄然展開 —
        </blockquote>
      </div>
    </section>

    <section class="subpage-section">
      <div class="subpage-section-title">寶石心臟   ·   The Gem Heart</div>
      <div class="subpage-text">
        <p>科學家們以刻印在寶石裡的魔法為基，從中拼接、提煉、創造。<br>最終，他們用寶石造出了一顆「心臟」，一顆如寶石般堅硬、卻又像真正臟腑般脆弱的心臟。<br><br>
          而當那顆心臟在實驗體的胸腔跳起第一下時，他們意識到：<br></p>
        <blockquote class="quote-block">
          他們創造出了「生命」，<br>
          他們成為了自己口中的「神」。
        </blockquote>
        <br>
        科學家們的組織 ——<span class="highlight-line">「彌賽亞」</span>也因此受到大多數人的支持。<br><br>
        <p>在這之後，一個個有著<span class="highlight-line">寶石心臟</span>的人造人誕生了。大家稱呼他們為<span class="highlight-line">「巴別塔」</span>。<br>
          受到帶有魔法的心臟的影響，巴別塔都有著易於常人的能力：預言、操控、模仿、不死等等……<br></p>
        <blockquote class="quote-block">
          「神明已失去祂的用途，現在人類才是世界的主宰 ！」<br>
          人類如此高聲歡呼著。
        </blockquote>
      </div>
    </section>

    <section class="subpage-section">
      <div class="subpage-section-title">本源   ·   Origin</div>
      <div class="subpage-text">
        <p>神在創造一切生命時，都會<span class="highlight-line">為其心臟標上「本源」</span>。<br>每個人的本源都不同，它會標記著每個人<span class="highlight-line">從何而來、為何存在、以及該向何處前行</span>。<br><br>
          本源既是「定義」，也是「約束」。<br>它確保了每一個生命都被納入世界的管制之中。卻也使人類中無法誕生出足以動搖神明自身的存在。<br>換句話說，「本源」是一種安全機制，將萬物穩固於神所允許的範圍之內。<br><br>
          而世界的穩定，正是建立於此。<br></p>
        <p>然而，「無本源之人」卻是例外，他們沒有真實的「心臟」，也就沒有本源。<br>於是，他們會吞噬周圍人的「本源」。而當本源逐漸被削弱、剝離，個體的理智、
          信念與存在的方向，也會隨之崩解。<br>
          最終，這些人將失去部分自我，理念以及價值觀開始向「無本源者」靠攏，逐漸脫離神明的掌控。<br></p>
        <blockquote class="quote-block">
          巴別塔的心臟作為「人所創造之物」，並未擁有本源。<br>
          他們成為了世界的漏洞 —— 而漏洞，是要被修正的。
        </blockquote>
      </div>
    </section>

    <section class="subpage-section">
      <div class="subpage-section-title">時間倒流   ·   Time Reversal</div>
      <div class="subpage-text">
        <p>於是世界的「清除機制」開始了，時間開始倒流。<br>
          以人造人為中心，與實驗者相關的血統、記錄，以及一切能證明這場實驗存在的痕跡都將清除。 
          一次又一次，時間倒流、文明倒退、科技化為灰燼。
          這場屠殺為的不是懲罰，而是<span class="highlight-line">「清除所有『無本源造物』的痕跡」</span>。</p>
        <blockquote class="quote-block">這就是世界的自我修復。
          它會不斷的重置，直到「不該存在的東西」被完全抹去。 </blockquote>
      </div>
    </section>

    <section class="subpage-section">
      <div class="subpage-section-title">倖存者   ·   Survivor</div>
      <div class="subpage-text">
        <p>斯洛特拉剛睜開眼看到的便是這幅景象：</p><br>
        <blockquote class="quote-block">科學家們的皺紋消失、白髮轉黑、變成少年、孩童
          、嬰兒，最後連身影都被抹除，只剩下空蕩蕩的白色實驗室。</blockquote><br>
        <p>可她還活著。<br>正如前面所提到的，受到帶有魔法的心臟的影響，巴別塔都有著易於常人的能力：預言、操控、模仿、不死等等……

    };

    const scrollToTop = () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    function navTo(section) {
      activeSection.value = section;
      const el = document.getElementById(section);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth' });
      }
      setTimeout(() => sidebarOpen.value = false, 200);

      },
    ]);

    let slideTimer = null;
    function startTimer() { slideTimer = setInterval(() => nextSlide(), 5500); }
    function resetTimer() { clearInterval(slideTimer); startTimer(); }
    function nextSlide() { currentSlide.value = (currentSlide.value + 1) % slides.value.length; }
    function prevSlide() { currentSlide.value = (currentSlide.value - 1 + slides.value.length) % slides.value.length; }
    function goToSlide(i) { currentSlide.value = i; resetTimer(); }

    // ===== Articles =====
    const articles = ref([
      { id: 1, title: '一切的起源', category: 'origin', excerpt: '過去存在於未來中，而未來亦在過去裡', emoji: '🌌', color: 'linear-gradient(135deg, #0a1628, #2d6891)', },

    ]);

    const activeTag = ref('');
    const allTags = computed(() => {
      const tags = new Set();
      articles.value.forEach(a => (a.tags || []).forEach(t => tags.add(t)));
      return Array.from(tags);
    });
    const filteredArticles = computed(() => {
      return articles.value.filter(a => !activeTag.value || (a.tags || []).includes(activeTag.value));
    });
    function filterTag(tag) { activeTag.value = activeTag.value === tag ? '' : tag; }

    // Re-init fade-ins when returning home
    watch(currentPage, (val) => {
      if (val === 'home') {
        setTimeout(() => {
          const els = document.querySelectorAll('.fade-in');
          const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
          }, { threshold: 0.1 });
          els.forEach(el => obs.observe(el));
        }, 50);
      }
    });

    onMounted(() => {
      window.addEventListener('scroll', handleScroll); 
      startTimer();
      const els = document.querySelectorAll('.fade-in');
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
      }, { threshold: 0.1 });
      els.forEach(el => obs.observe(el));
    });

    onUnmounted(() => {
      window.removeEventListener('scroll', handleScroll);
      clearInterval(slideTimer);
    });

    return {
      currentPage, openPage, goHome, goBack,
      showBackTop, scrollToTop,
      sidebarOpen, subSidebarOpen, activeSection, navTo,
      currentSlide, slides,
